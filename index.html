<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyglass Isles</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="game"></canvas>

      <section class="hud" aria-label="Game status">
        <div>
          <span class="label">Crystals</span>
          <strong id="score">0 / 7</strong>
        </div>
        <div>
          <span class="label">Distance</span>
          <strong id="moves">0</strong>
        </div>
        <button id="reset" type="button" title="Reset run">Reset</button>
      </section>

      <section class="toast" id="toast" aria-live="polite">
        Use WASD or arrow keys to collect every crystal.
      </section>

      <section class="hotbar" aria-label="Hotbar">
        <button class="hotbar-slot is-active" type="button" data-slot="1" aria-label="Hotbar slot 1">
          <span>1</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="2" aria-label="Hotbar slot 2">
          <span>2</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="3" aria-label="Hotbar slot 3">
          <span>3</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="4" aria-label="Hotbar slot 4">
          <span>4</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="5" aria-label="Hotbar slot 5">
          <span>5</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="6" aria-label="Hotbar slot 6">
          <span>6</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="7" aria-label="Hotbar slot 7">
          <span>7</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="8" aria-label="Hotbar slot 8">
          <span>8</span>
        </button>
        <button class="hotbar-slot" type="button" data-slot="9" aria-label="Hotbar slot 9">
          <span>9</span>
        </button>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./dist/game.js"></script>
  </body>
</html>
